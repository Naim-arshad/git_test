<head>
    <title>Survey Form</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <script src="https://cdn.freecodecamp.org/testable-projects-fcc/v1/bundle.js"></script>


    <header>
        <h1 id="title">freeCodeCamp Survey Form</h1>
        <p id="description">
            Thanks you for taking the time to help us improve the platform
        </p>
    </header>
    <body>
        <form id="survey-form" action="#">
            <label for="name" id="name-label">
                Name
                <input type="text" id="name" placeholder="Enter your name" required>
            </label>
            <label for="email" id="email-label"> 
                Email
                <input type="email" id="email" placeholder="Enter your email" required>
            </label>
            <label for="number" id="number-label"> 
                Age
                <input type="number" min="18" max="99" id="number" placeholder="Age"> 
            </label>
            <label for="dropdown">
                Which option best describes your current role?
                <select id="dropdown" name="dropdown">
                    <option value="student">Student</option>
                    <option value="FullTime">Full Time Job</option>
                    <option value="FullLearner">Full Time Learner</option>
                    <option value="No">Prefer not to say</option>
                    <option value="other">Other</option>
                </select>
            </label>
            <p>Would you recommend freeCodeCamp to a friend?</p>
            <label for="definitely">
                <input type="radio" id="definitely" name="recommend"value="def"> Definitely
            </label>
            <label for="maybe">
                <input type="radio" id="maybe" name="recommend" value="mb"> Maybe
            </label>
            <label for="not">
                <input type="radio" id="not" name="recommend" value="not"> Not sure
            </label>
            <label for="cb-fep">
                <input type="checkbox" id="cb-fep" name="cb" value="be">Front-End Projects
            </label>
            <label for="cb-bep">
                <input type="checkbox" id="cb-bep" name="cb" value="fe">Back-End Projects
            </label>
            <textarea placeholder="If you have any sugestion">

            </textarea>

            <input type="submit" id="submit">
        </form>
    </body>
</body>
